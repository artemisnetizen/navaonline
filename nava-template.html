<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Nava</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="nava-styles.css">
<script src="nava-cart.js"></script>
</head>
<body>

<nav class="nav" id="nav">
  <a href="index.html" style="display:flex;align-items:center;">
    <img src="logo.png" alt="Nava" style="height:24px;width:auto;">
  </a>
  <div class="nav-links">
    <div class="nav-collections" tabindex="0">
      <span class="nav-collections-trigger">Visit
        <svg width="8" height="6" viewBox="0 0 8 6" fill="none"><path d="M1 1L4 4.5L7 1" stroke="rgba(240,237,228,0.6)" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </span>
      <div class="nav-collections-dd">
        <div class="nav-collections-dd-inner">
          <a href="index2.html">Home</a>
          <a href="suri-hanging-earrings.html">Origami</a>
          <a href="#">Collection 2</a>
        </div>
      </div>
    </div>
    <a class="nav-link" href="faq.html">FAQ</a>
    <a class="nav-link" href="about.html">About</a>
    <a class="nav-link cart-icon-link" id="cartIconLink" href="cart.html">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 7h12l-1 13a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2L6 7Z"/>
        <path d="M9 7V5a3 3 0 0 1 6 0v2"/>
      </svg>
      <span class="cart-badge" id="cartBadge"></span>
    </a>
  </div>
</nav>

<div class="hero" id="hero">
  <div class="hero-track" id="heroTrack"></div>
  <div class="hero-overlay"></div>
  <div class="hero-counter" id="heroCounter"></div>
  <div class="hero-thumbs" id="heroThumbs"></div>
  <div class="hero-identity">
    <div class="hero-identity-top">
      <div class="hero-tag" id="heroTag"></div>
      <div class="hero-dots" id="heroDots"></div>
    </div>
    <div class="piece-name" id="pieceName"></div>
  </div>
</div>

<div class="exhibit-nav" id="exhibitNav"></div>

<div class="tabs-wrap">
  <div class="tab-row" id="tabRow">
    <button class="tab-btn on" data-t="design">The thinking</button>
    <button class="tab-btn" data-t="prov">Provenance</button>
  </div>
  <div class="tab-panel">
    <div id="panel-design" class="story"></div>
    <div id="panel-prov" class="prov-rows" style="display:none;"></div>
  </div>
</div>

<div class="expanders" id="expandersWrap">
  <div class="exp-row" id="skinExpRow">
    <div class="exp-head" id="skinHead">
      <span class="exp-label">How it sits on you</span>
      <div class="exp-icon" id="skinIcon">
        <svg viewBox="0 0 10 10" fill="none"><path d="M5 1V9M1 5H9" stroke="#797842" stroke-width="1.3" stroke-linecap="round"/></svg>
      </div>
    </div>
    <div class="exp-body" id="skinBody">
      <div class="exp-inner">
        <div class="skin-row" id="skinRow">
          <div class="stile t1 sel" data-i="0">
            <svg class="sring-svg" viewBox="0 0 60 24" fill="none"><ellipse cx="30" cy="12" rx="27" ry="10" stroke="#9a9a58" stroke-width="3.5" fill="none"/></svg>
            <span class="slabel">Light</span>
          </div>
          <div class="stile t2" data-i="1">
            <svg class="sring-svg" viewBox="0 0 60 24" fill="none"><ellipse cx="30" cy="12" rx="27" ry="10" stroke="#b0b068" stroke-width="3.5" fill="none"/></svg>
            <span class="slabel">Medium</span>
          </div>
          <div class="stile t3" data-i="2">
            <svg class="sring-svg" viewBox="0 0 60 24" fill="none"><ellipse cx="30" cy="12" rx="27" ry="10" stroke="#c8c878" stroke-width="3.5" fill="none"/></svg>
            <span class="slabel">Deep warm</span>
          </div>
          <div class="stile t4" data-i="3">
            <svg class="sring-svg" viewBox="0 0 60 24" fill="none"><ellipse cx="30" cy="12" rx="27" ry="10" stroke="#d8d890" stroke-width="3.5" fill="none"/></svg>
            <span class="slabel">Deep</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="exp-row" id="sizeExpRow">
    <div class="exp-head" id="sizeHead">
      <span class="exp-label">Size</span>
      <div class="exp-icon" id="sizeIcon">
        <svg viewBox="0 0 10 10" fill="none"><path d="M5 1V9M1 5H9" stroke="#797842" stroke-width="1.3" stroke-linecap="round"/></svg>
      </div>
    </div>
    <div class="exp-body" id="sizeBody">
      <div class="exp-inner">
        <div class="size-row" id="sizeRow"></div>
        <div class="sz-note">Not sure of your size? We will help — just ask when you order.</div>
      </div>
    </div>
  </div>
</div>

<div class="price-block">
  <div class="price" id="priceDisplay"></div>
  <div class="price-note">Made to order · Free delivery</div>
</div>

<div class="qty-cta-row">
  <div class="qty-block">
    <div class="qty-stepper">
      <button class="qty-btn" id="qtyMinus" type="button">−</button>
      <span class="qty-value" id="qtyValue">1</span>
      <button class="qty-btn" id="qtyPlus" type="button">+</button>
    </div>
  </div>

  <div class="cta-block">
    <button class="cta-btn" id="ctaBtn" type="button">Add to cart</button>
  </div>
</div>

<script>
const piece = {
  name: "",
  collection: "",
  imageFolder: "",
  images: [],
  price: "",
  shopifyVariantId: "REPLACE_VARIANT_ID",
  story: "",
  provenance: {
    "Made in": "",
    "Craft": "",
    "Material": "",
    "Weight": "",
    "Ready in": ""
  },
  sizes: [],
  showSkinTones: false,
  showSizes: false,
  nextPiece: { name: "", file: "" },
  prevPiece: { name: "", file: "" }
}

const PIECE_INDEX = 0;

/* ── RENDER FROM PIECE ── */
document.title = `Nava — ${piece.name}`;

// Hero slides
const track = document.getElementById('heroTrack');
const totalSlides = piece.images.length;
track.style.width = `${totalSlides * 100}%`;
piece.images.forEach(src => {
  const slide = document.createElement('div');
  slide.className = 'hero-slide';
  slide.style.width = `${100 / totalSlides}%`;
  const img = document.createElement('img');
  img.src = `${piece.imageFolder}/${src}`;
  img.alt = piece.name;
  slide.appendChild(img);
  track.appendChild(slide);
});

document.getElementById('heroTag').textContent = piece.collection;

// Hero dots
const dotsEl = document.getElementById('heroDots');
piece.images.forEach((_, i) => {
  const dot = document.createElement('div');
  dot.className = i === 0 ? 'hdot on' : 'hdot';
  dotsEl.appendChild(dot);
});

// Hero thumbnails
const thumbsEl = document.getElementById('heroThumbs');
piece.images.forEach((src, i) => {
  const th = document.createElement('div');
  th.className = i === 0 ? 'hthumb on' : 'hthumb';
  const tImg = document.createElement('img');
  tImg.src = `${piece.imageFolder}/${src}`;
  tImg.alt = '';
  th.appendChild(tImg);
  th.addEventListener('click', () => setSlide(i));
  thumbsEl.appendChild(th);
});

// Piece header
document.getElementById('pieceName').textContent = piece.name;

// Story
document.getElementById('panel-design').textContent = piece.story;

// Provenance
const provEl = document.getElementById('panel-prov');
Object.entries(piece.provenance).forEach(([k, v]) => {
  const row = document.createElement('div');
  row.className = 'prow';
  row.innerHTML = `<span class="pk">${k}</span><span class="pv">${v}</span>`;
  provEl.appendChild(row);
});

// Price
document.getElementById('priceDisplay').textContent = piece.price;

// Sizes (select second by default)
const showSkinTones = piece.showSkinTones !== false;
const showSizes = piece.showSizes !== false && Array.isArray(piece.sizes) && piece.sizes.length > 0;

if (!showSkinTones) {
  document.getElementById('skinExpRow').style.display = 'none';
}

if (showSizes) {
  const sizeRowEl = document.getElementById('sizeRow');
  piece.sizes.forEach((s, i) => {
    const btn = document.createElement('button');
    btn.className = i === 1 ? 'szchip sel' : 'szchip';
    btn.dataset.s = s;
    btn.textContent = s;
    sizeRowEl.appendChild(btn);
  });
} else {
  document.getElementById('sizeExpRow').style.display = 'none';
}

if (!showSkinTones && !showSizes) {
  document.getElementById('expandersWrap').style.display = 'none';
}

/* ── NAV SCROLL ── */
const nav = document.getElementById('nav');
window.addEventListener('scroll', () => {
  nav.classList.toggle('scrolled', window.scrollY > 10);
}, { passive: true });

/* ── IMAGE SLIDER ── */
const counter = document.getElementById('heroCounter');
let current    = 0;
let startX     = 0;
let dragDx     = 0;
let isDragging = false;

counter.textContent = totalSlides ? `1 / ${totalSlides}` : '';

function setSlide(idx, animate) {
  if (animate === false) track.classList.add('no-transition');
  current = (idx + totalSlides) % totalSlides;
  track.style.transform = `translateX(-${current * (100 / totalSlides)}%)`;
  if (animate === false) requestAnimationFrame(() => track.classList.remove('no-transition'));
  document.querySelectorAll('.hdot').forEach((d, i) => d.classList.toggle('on', i === current));
  document.querySelectorAll('.hthumb').forEach((t, i) => t.classList.toggle('on', i === current));
  counter.textContent = `${current + 1} / ${totalSlides}`;
}

const heroEl = document.getElementById('hero');
function dragStart(x) { startX = x; dragDx = 0; isDragging = true; }
function dragMove(x)  { if (isDragging) dragDx = x - startX; }
function dragEnd()    {
  if (!isDragging) return; isDragging = false;
  if      (dragDx < -44) setSlide(current + 1);
  else if (dragDx >  44) setSlide(current - 1);
}
heroEl.addEventListener('touchstart', e => dragStart(e.touches[0].clientX),    { passive: true });
heroEl.addEventListener('touchmove',  e => dragMove(e.touches[0].clientX),     { passive: true });
heroEl.addEventListener('touchend',   dragEnd,                                  { passive: true });
heroEl.addEventListener('mousedown',  e => dragStart(e.clientX));
heroEl.addEventListener('mousemove',  e => dragMove(e.clientX));
heroEl.addEventListener('mouseup',    dragEnd);
heroEl.addEventListener('mouseleave', dragEnd);

/* ── EXHIBIT NAV ── */
const PIECES = [
  { file: 'suri-hanging-earrings.html' },
  { file: 'suri-ring.html' },
  { file: 'niva-earrings.html' },
  { file: 'vara-bangle.html' },
  { file: 'vara-pendant.html' },
  { file: 'vara-hoops.html' },
  { file: 'vara-nosepin.html' },
  { file: 'rani-nosepin.html' },
  { file: 'abha-ring.html' },
  { file: 'sama-pendant.html' }
];
function buildExhibitNav() {
  const nav = document.getElementById('exhibitNav');
  const collectionName = piece.collection.split('·')[0].trim();
  const prevChevron = `<svg viewBox="0 0 10 10" fill="none" width="10" height="10"><path d="M7 2L3 5L7 8" stroke="rgba(240,237,228,0.7)" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  const nextChevron = `<svg viewBox="0 0 10 10" fill="none" width="10" height="10"><path d="M3 2L7 5L3 8" stroke="rgba(240,237,228,0.7)" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

  const prevSide = document.createElement('a');
  prevSide.className = 'exhibit-nav-side prev';
  if (piece.prevPiece) {
    prevSide.href = piece.prevPiece.file;
    prevSide.innerHTML = `<div class="exhibit-nav-label-row">${prevChevron}<span class="exhibit-nav-name">${piece.prevPiece.name}</span></div><span class="exhibit-nav-count">${PIECE_INDEX - 1} / ${PIECES.length}</span>`;
  } else {
    prevSide.href = 'index.html';
    prevSide.innerHTML = `<div class="exhibit-nav-label-row">${prevChevron}<span class="exhibit-nav-name">${collectionName}</span></div><span class="exhibit-nav-count">Back to collection</span>`;
  }
  nav.appendChild(prevSide);

  const addBtn = document.createElement('button');
  addBtn.className = 'exhibit-nav-add';
  addBtn.type = 'button';
  addBtn.setAttribute('aria-label', 'Quick add to cart');
  addBtn.innerHTML = `<svg viewBox="0 0 10 10" fill="none"><path d="M5 1V9M1 5H9" stroke="#797842" stroke-width="1.3" stroke-linecap="round"/></svg><span class="exhibit-nav-tooltip">I like it</span>`;
  addBtn.addEventListener('click', async () => {
    addBtn.disabled = true;
    try {
      await addToCart(piece.shopifyVariantId, 1);
      await updateCartBadge();
      showToast(`${piece.name} added to cart`);
    } catch (err) {
      showToast('Could not add to cart — please try again');
      console.error(err);
    } finally {
      addBtn.disabled = false;
    }
  });
  nav.appendChild(addBtn);

  const nextSide = document.createElement('a');
  nextSide.className = 'exhibit-nav-side next';
  if (piece.nextPiece) {
    nextSide.href = piece.nextPiece.file;
    nextSide.innerHTML = `<div class="exhibit-nav-label-row"><span class="exhibit-nav-name">${piece.nextPiece.name}</span>${nextChevron}</div><span class="exhibit-nav-count">${PIECE_INDEX + 1} / ${PIECES.length}</span>`;
  } else {
    nextSide.href = 'index.html';
    nextSide.innerHTML = `<div class="exhibit-nav-label-row"><span class="exhibit-nav-name">${collectionName}</span>${nextChevron}</div><span class="exhibit-nav-count">Back to collection</span>`;
  }
  nav.appendChild(nextSide);
}
buildExhibitNav();

/* ── TABS ── */
document.getElementById('tabRow').querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', function () {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('on'));
    this.classList.add('on');
    const t = this.dataset.t;
    document.getElementById('panel-design').style.display = t === 'design' ? 'block' : 'none';
    document.getElementById('panel-prov').style.display   = t === 'prov'   ? 'block' : 'none';
  });
});

/* ── EXPANDERS ── */
function makeExp(headId, iconId, bodyId) {
  let open = false;
  document.getElementById(headId).addEventListener('click', () => {
    open = !open;
    document.getElementById(bodyId).classList.toggle('open', open);
    document.getElementById(iconId).classList.toggle('open', open);
  });
}
makeExp('skinHead', 'skinIcon', 'skinBody');
makeExp('sizeHead', 'sizeIcon', 'sizeBody');

/* ── SKIN TILES ── */
document.getElementById('skinRow').querySelectorAll('.stile').forEach(t => {
  t.addEventListener('click', function () {
    document.querySelectorAll('.stile').forEach(x => x.classList.remove('sel'));
    this.classList.add('sel');
  });
});

/* ── SIZE CHIPS ── */
document.getElementById('sizeRow').querySelectorAll('.szchip').forEach(c => {
  c.addEventListener('click', function () {
    document.querySelectorAll('.szchip').forEach(x => x.classList.remove('sel'));
    this.classList.add('sel');
  });
});

let currentQty = 1;
const qtyValueEl = document.getElementById('qtyValue');
document.getElementById('qtyMinus').addEventListener('click', () => {
  if (currentQty > 1) { currentQty--; qtyValueEl.textContent = currentQty; }
});
document.getElementById('qtyPlus').addEventListener('click', () => {
  currentQty++; qtyValueEl.textContent = currentQty;
});

document.getElementById('ctaBtn').addEventListener('click', async () => {
  const btn = document.getElementById('ctaBtn');
  btn.disabled = true;
  btn.textContent = 'Adding...';
  try {
    await addToCart(piece.shopifyVariantId, currentQty);
    await updateCartBadge();
    showToast(`${piece.name} added to cart`);
    currentQty = 1;
    qtyValueEl.textContent = currentQty;
  } catch (err) {
    showToast('Could not add to cart — please try again');
    console.error(err);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Add to cart';
  }
});
</script>
<footer style="display:flex;justify-content:center;gap:28px;padding:14px 24px;background:rgba(54,25,43,0.92);backdrop-filter:blur(10px);border-top:1px solid rgba(240,237,228,0.12);">
  <a href="privacy.html" style="font-family:'DM Sans','Helvetica Neue',sans-serif;font-size:10px;font-weight:400;letter-spacing:0.14em;text-transform:uppercase;color:rgba(240,237,228,0.5);text-decoration:none;">Privacy Policy</a>
  <a href="terms.html" style="font-family:'DM Sans','Helvetica Neue',sans-serif;font-size:10px;font-weight:400;letter-spacing:0.14em;text-transform:uppercase;color:rgba(240,237,228,0.5);text-decoration:none;">Terms of Service</a>
  <a href="contact.html" style="font-family:'DM Sans','Helvetica Neue',sans-serif;font-size:10px;font-weight:400;letter-spacing:0.14em;text-transform:uppercase;color:rgba(240,237,228,0.5);text-decoration:none;">Contact</a>
</footer>
</body>
</html>
