<script>
const piece = {
  name: "Sama Pendant",
  collection: "Origami · Pendant",
  imageFolder: "Sama_Pendant",
  images: ["Sama_Pendant_1.webp", "Sama_Pendant_2.webp", "Sama_Pendant_3.jpg", "Sama_Pendant_4.webp"],
  price: "₹ 54,299",
  story: "Speaking of fluidity, our hero piece, the Sama Pendant is a paradox. It looks like a bunch of cubes but is designed to represent a waterfall in motion, imagined cubistically",
  provenance: {
    "Made in": "Jaipur",
    "Craft": "Hand-fabricated",
    "Material": "9 kt gold",
    "Weight": "11.4 grams",
    "Ready in": "18 – 22 days"
  },
  sizes: ["2.2″", "2.4″", "2.6″", "2.8″", "Custom"],
  nextPiece: null,
  prevPiece: { name: "Abha Ring", file: "abha-ring.html" }
}

document.getElementById('ctaBtn').href =
  `https://wa.me/917356774555?text=${encodeURIComponent(`Hi. I am interested in exploring a purchase for ${piece.name} by Nava.`)}`;
document.getElementById('orderNavLink').href =
  `https://wa.me/917356774555?text=${encodeURIComponent(`Hi. I am interested in exploring a purchase for ${piece.name} by Nava.`)}`;
const PIECE_INDEX = 10;

/* ── RENDER FROM PIECE ── */
document.title = `Nava — ${piece.name}`;

// Hero slides
const track = document.getElementById('heroTrack');
const totalSlides = piece.images.length;
track.style.width = `${totalSlides * 100}%`;
piece.images.forEach(src => {
  const slide = document.createElement('div');
  slide.className = 'hero-slide';
  slide.style.width = `${100 / totalSlides}%`;
  const img = document.createElement('img');
  img.src = `${piece.imageFolder}/${src}`;
  img.alt = piece.name;
  slide.appendChild(img);
  track.appendChild(slide);
});

document.getElementById('heroTag').textContent = piece.collection;

// Hero thumbnails
const thumbsEl = document.getElementById('heroThumbs');
piece.images.forEach((src, i) => {
  const th = document.createElement('div');
  th.className = i === 0 ? 'hthumb on' : 'hthumb';
  const tImg = document.createElement('img');
  tImg.src = `${piece.imageFolder}/${src}`;
  tImg.alt = '';
  th.appendChild(tImg);
  th.addEventListener('click', () => setSlide(i));
  thumbsEl.appendChild(th);
});

// Piece header
document.getElementById('pieceName').textContent = piece.name;

// Story
document.getElementById('panel-design').textContent = piece.story;

// Provenance
const provEl = document.getElementById('panel-prov');
Object.entries(piece.provenance).forEach(([k, v]) => {
  const row = document.createElement('div');
  row.className = 'prow';
  row.innerHTML = `<span class="pk">${k}</span><span class="pv">${v}</span>`;
  provEl.appendChild(row);
});

// Price
document.getElementById('priceDisplay').textContent = piece.price;

// Sizes (select second by default)
const sizeRowEl = document.getElementById('sizeRow');
piece.sizes.forEach((s, i) => {
  const btn = document.createElement('button');
  btn.className = i === 1 ? 'szchip sel' : 'szchip';
  btn.dataset.s = s;
  btn.textContent = s;
  sizeRowEl.appendChild(btn);
});

/* ── NAV SCROLL ── */
const nav = document.getElementById('nav');
window.addEventListener('scroll', () => {
  nav.classList.toggle('scrolled', window.scrollY > 10);
}, { passive: true });

/* ── IMAGE SLIDER ── */
let current    = 0;
let startX     = 0;
let dragDx     = 0;
let isDragging = false;

function setSlide(idx, animate) {
  if (animate === false) track.classList.add('no-transition');
  current = (idx + totalSlides) % totalSlides;
  track.style.transform = `translateX(-${current * (100 / totalSlides)}%)`;
  if (animate === false) requestAnimationFrame(() => track.classList.remove('no-transition'));
  document.querySelectorAll('.hthumb').forEach((t, i) => t.classList.toggle('on', i === current));
}

const heroEl = document.getElementById('hero');
function dragStart(x) { startX = x; dragDx = 0; isDragging = true; }
function dragMove(x)  { if (isDragging) dragDx = x - startX; }
function dragEnd()    {
  if (!isDragging) return; isDragging = false;
  if      (dragDx < -44) setSlide(current + 1);
  else if (dragDx >  44) setSlide(current - 1);
}
heroEl.addEventListener('touchstart', e => dragStart(e.touches[0].clientX),    { passive: true });
heroEl.addEventListener('touchmove',  e => dragMove(e.touches[0].clientX),     { passive: true });
heroEl.addEventListener('touchend',   dragEnd,                                  { passive: true });
heroEl.addEventListener('mousedown',  e => dragStart(e.clientX));
heroEl.addEventListener('mousemove',  e => dragMove(e.clientX));
heroEl.addEventListener('mouseup',    dragEnd);
heroEl.addEventListener('mouseleave', dragEnd);

/* ── FLOWER STRIP ── */
const PIECES = [
  { file: 'suri-hanging-earrings.html' },
  { file: 'suri-ring.html' },
  { file: 'niva-earrings.html' },
  { file: 'vara-bangle.html' },
  { file: 'vara-pendant.html' },
  { file: 'vara-hoops.html' },
  { file: 'vara-nosepin.html' },
  { file: 'rani-nosepin.html' },
  { file: 'abha-ring.html' },
  { file: 'sama-pendant.html' }
];

function buildFlower(active) {
  const petals = [
    { pts: '170,170 148,128 170,88 192,128',  tip:[170,88],  crease:[[148,128],[192,128]] },
    { pts: '170,170 198,142 227,113 214,156',  tip:[227,113], crease:[[198,142],[214,156]] },
    { pts: '170,170 212,148 252,170 212,192',  tip:[252,170], crease:[[212,148],[212,192]] },
    { pts: '170,170 214,184 227,227 198,198',  tip:[227,227], crease:[[214,184],[198,198]] },
    { pts: '170,170 148,212 170,252 192,212',  tip:[170,252], crease:[[148,212],[192,212]] },
    { pts: '170,170 126,184 113,227 142,198',  tip:[113,227], crease:[[126,184],[142,198]] },
    { pts: '170,170 128,148 88,170 128,192',   tip:[88,170],  crease:[[128,148],[128,192]] },
    { pts: '170,170 126,156 113,113 142,142',  tip:[113,113], crease:[[126,156],[142,142]] },
  ];
  const fills  = active ? ['#6a6a38','#7a7a45','#5a5a30'] : ['#4a2438','#5a2d47','#3a1a2c'];
  const sOp    = active ? [0.65,0.55,0.65]               : [0.45,0.4,0.45];
  const cFill  = active ? '#4a4a22' : '#2e1525';
  const spine  = active ? 'rgba(240,237,228,0.4)'  : 'rgba(240,237,228,0.3)';
  const crease = active ? 'rgba(240,237,228,0.22)' : 'rgba(240,237,228,0.15)';
  const ns = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(ns, 'svg');
  svg.setAttribute('viewBox', '70 70 200 200');
  svg.setAttribute('fill', 'none');
  svg.style.width = '100%'; svg.style.height = '100%'; svg.style.overflow = 'visible';
  petals.forEach((p, idx) => {
    const poly = document.createElementNS(ns, 'polygon');
    poly.setAttribute('points', p.pts);
    poly.setAttribute('fill', fills[idx % 3]);
    poly.setAttribute('stroke', `rgba(240,237,228,${sOp[idx % 3]})`);
    poly.setAttribute('stroke-width', '0.8');
    svg.appendChild(poly);
    const sp = document.createElementNS(ns, 'line');
    sp.setAttribute('x1','170'); sp.setAttribute('y1','170');
    sp.setAttribute('x2', String(p.tip[0])); sp.setAttribute('y2', String(p.tip[1]));
    sp.setAttribute('stroke', spine); sp.setAttribute('stroke-width','0.6');
    svg.appendChild(sp);
    p.crease.forEach(([cx,cy]) => {
      const cl = document.createElementNS(ns,'line');
      cl.setAttribute('x1','170'); cl.setAttribute('y1','170');
      cl.setAttribute('x2',String(cx)); cl.setAttribute('y2',String(cy));
      cl.setAttribute('stroke', crease); cl.setAttribute('stroke-width','0.5');
      cl.setAttribute('stroke-dasharray','2,2');
      svg.appendChild(cl);
    });
  });
  const ctr = document.createElementNS(ns,'polygon');
  ctr.setAttribute('points','170,152 186,156 192,170 186,184 170,188 154,184 148,170 154,156');
  ctr.setAttribute('fill', cFill);
  ctr.setAttribute('stroke', `rgba(240,237,228,${active ? 0.5 : 0.3})`);
  ctr.setAttribute('stroke-width','0.8');
  svg.appendChild(ctr);
  return svg;
}

(function buildFlowerStrip() {
  const strip = document.getElementById('flowerStrip');
  const prevChev = document.createElement('div');
  prevChev.className = PIECE_INDEX <= 1 ? 'fstrip-chevron fstrip-chevron-disabled' : 'fstrip-chevron';
  prevChev.innerHTML = `<svg viewBox="0 0 10 10" fill="none" width="10" height="10"><path d="M7 2L3 5L7 8" stroke="rgba(240,237,228,0.7)" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  if (PIECE_INDEX > 1) prevChev.addEventListener('click', () => window.location = PIECES[PIECE_INDEX - 2].file);
  strip.appendChild(prevChev);
  PIECES.forEach((p, i) => {
    const idx1 = i + 1;
    const wrap = document.createElement('div');
    wrap.className = idx1 === PIECE_INDEX ? 'fstrip-flower-active' : 'fstrip-flower';
    if (idx1 !== PIECE_INDEX) wrap.addEventListener('click', () => window.location = p.file);
    wrap.appendChild(buildFlower(idx1 === PIECE_INDEX));
    strip.appendChild(wrap);
  });
  const nextChev = document.createElement('div');
  nextChev.className = PIECE_INDEX >= PIECES.length ? 'fstrip-chevron fstrip-chevron-disabled' : 'fstrip-chevron';
  nextChev.innerHTML = `<svg viewBox="0 0 10 10" fill="none" width="10" height="10"><path d="M3 2L7 5L3 8" stroke="rgba(240,237,228,0.7)" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  if (PIECE_INDEX < PIECES.length) nextChev.addEventListener('click', () => window.location = PIECES[PIECE_INDEX].file);
  strip.appendChild(nextChev);
})();

/* ── TABS ── */
document.getElementById('tabRow').querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', function () {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('on'));
    this.classList.add('on');
    const t = this.dataset.t;
    document.getElementById('panel-design').style.display = t === 'design' ? 'block' : 'none';
    document.getElementById('panel-prov').style.display   = t === 'prov'   ? 'block' : 'none';
  });
});

/* ── EXPANDERS ── */
function makeExp(headId, iconId, bodyId) {
  let open = false;
  document.getElementById(headId).addEventListener('click', () => {
    open = !open;
    document.getElementById(bodyId).classList.toggle('open', open);
    document.getElementById(iconId).classList.toggle('open', open);
  });
}
makeExp('skinHead', 'skinIcon', 'skinBody');
makeExp('sizeHead', 'sizeIcon', 'sizeBody');

/* ── SKIN TILES ── */
document.getElementById('skinRow').querySelectorAll('.stile').forEach(t => {
  t.addEventListener('click', function () {
    document.querySelectorAll('.stile').forEach(x => x.classList.remove('sel'));
    this.classList.add('sel');
  });
});

/* ── SIZE CHIPS ── */
document.getElementById('sizeRow').querySelectorAll('.szchip').forEach(c => {
  c.addEventListener('click', function () {
    document.querySelectorAll('.szchip').forEach(x => x.classList.remove('sel'));
    this.classList.add('sel');
  });
});
</script>
