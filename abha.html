<script>
/* ── DESIGN (shared across all Vaan variants) ── */
const design = {
  name: "Abha",
  nextPiece: { name: "Sama", file: "sama.html" },
  prevPiece: { name: "Rani", file: "rani.html" }
};

/* ── VARIANTS — each fully independent: own images, price, story,
   provenance, sizes, and Shopify variant ID. "earring" is placeholder
   data pending real photography/copy/pricing; "ring" carries the real
   data this page previously shipped with. ── */
const variants = {
  ring: {
    label: "Ring",
    collection: "Origami · Rings",
    imageFolder: "Abha_Ring",
    images: ["abha_ring_1.webp", "abha_ring_2.jpg", "abha_ring_3.webp"],
    price: "₹ 13,199",
    shopifyVariantId: 49695723258098,
    story: "Our in-house designer wanted to try something a little different and we went back and forth on the play between origami and fluidity. The Abha ring embodies both: Origami, with its structured triangular blocks held together by a band of gold, and fluidity in its design of an infinity loop",
    provenance: {
      "Material": "9 kt gold",
      "Weight": "1.5 grams",
      "Ready in": "18 – 22 days"
    },
    sizes: ["8", "10", "12", "14", "16", "18", "20"],
    showSkinTones: false,
    showSizes: true
  }
};

let activeKey = "ring";

localStorage.setItem('nava_last_piece', window.location.pathname.split('/').pop());

const PIECE_INDEX = 5;

/* ── DOM refs ── */
const track       = document.getElementById('heroTrack');
const thumbsEl    = document.getElementById('heroThumbs');
const heroTagEl   = document.getElementById('heroTag');
const pieceNameEl = document.getElementById('pieceName');
const panelDesign = document.getElementById('panel-design');
const panelProv   = document.getElementById('panel-prov');
const priceEl     = document.getElementById('priceDisplay');
const sizeRowEl   = document.getElementById('sizeRow');
const sizeExpRow  = document.getElementById('sizeExpRow');
const skinExpRow  = document.getElementById('skinExpRow');
const expandersWrap = document.getElementById('expandersWrap');
const counter     = null; // no counter element on this page variant

pieceNameEl.textContent = design.name;

/* ── IMAGE SLIDER STATE ── */
let current    = 0;
let totalSlides = 0;
let startX     = 0;
let dragDx     = 0;
let isDragging = false;

function setSlide(idx, animate) {
  if (!totalSlides) return;
  if (animate === false) track.classList.add('no-transition');
  current = (idx + totalSlides) % totalSlides;
  track.style.transform = `translateX(-${current * (100 / totalSlides)}%)`;
  if (animate === false) requestAnimationFrame(() => track.classList.remove('no-transition'));
  document.querySelectorAll('.hthumb').forEach((t, i) => t.classList.toggle('on', i === current));
}

/* ── RENDER A VARIANT'S CONTENT INTO THE PAGE ── */
function renderVariant(key) {
  const v = variants[key];
  activeKey = key;

  document.title = `Nava — ${design.name} ${v.label}`;

  // Hero images
  track.innerHTML = '';
  thumbsEl.innerHTML = '';
  totalSlides = v.images.length;
  track.style.width = `${totalSlides * 100}%`;
  v.images.forEach(src => {
    const slide = document.createElement('div');
    slide.className = 'hero-slide';
    slide.style.width = `${100 / totalSlides}%`;
    const img = document.createElement('img');
    img.src = `${v.imageFolder}/${src}`;
    img.alt = `${design.name} ${v.label}`;
    slide.appendChild(img);
    track.appendChild(slide);
  });
  v.images.forEach((src, i) => {
    const th = document.createElement('div');
    th.className = i === 0 ? 'hthumb on' : 'hthumb';
    const tImg = document.createElement('img');
    tImg.src = `${v.imageFolder}/${src}`;
    tImg.alt = '';
    th.appendChild(tImg);
    th.addEventListener('click', () => setSlide(i));
    thumbsEl.appendChild(th);
  });
  setSlide(0, false);

  heroTagEl.textContent = v.collection;

  // Story
  panelDesign.textContent = v.story;

  // Provenance
  panelProv.innerHTML = '';
  Object.entries(v.provenance).forEach(([k, val]) => {
    const row = document.createElement('div');
    row.className = 'prow';
    row.innerHTML = `<span class="pk">${k}</span><span class="pv">${val}</span>`;
    panelProv.appendChild(row);
  });

  // Price
  priceEl.textContent = v.price;

  const showSkinTones = v.showSkinTones !== false;
  const showSizes = v.showSizes !== false && Array.isArray(v.sizes) && v.sizes.length > 0;

  skinExpRow.style.display = showSkinTones ? '' : 'none';

  sizeRowEl.innerHTML = '';
  if (showSizes) {
    sizeExpRow.style.display = '';
    v.sizes.forEach((s, i) => {
      const btn = document.createElement('button');
      btn.className = i === 1 ? 'szchip sel' : 'szchip';
      btn.dataset.s = s;
      btn.textContent = s;
      btn.addEventListener('click', function () {
        document.querySelectorAll('.szchip').forEach(x => x.classList.remove('sel'));
        this.classList.add('sel');
      });
      sizeRowEl.appendChild(btn);
    });
  } else {
    sizeExpRow.style.display = 'none';
  }

  expandersWrap.style.display = (showSkinTones || showSizes) ? '' : 'none';

  // Reset quantity
  currentQty = 1;
  qtyValueEl.textContent = currentQty;
}

/* ── VARIANT BOXES ── */
const variantBoxesEl = document.getElementById('variantBoxes');
Object.entries(variants).forEach(([key, v]) => {
  const box = document.createElement('div');
  box.className = key === activeKey ? 'variant-box active' : 'variant-box';
  box.textContent = v.label;
  box.dataset.key = key;
  box.tabIndex = 0;
  box.setAttribute('role', 'button');
  box.setAttribute('aria-pressed', key === activeKey ? 'true' : 'false');
  const activate = () => {
    if (key === activeKey) return;
    renderVariant(key);
    document.querySelectorAll('.variant-box').forEach(b => {
      const on = b.dataset.key === key;
      b.classList.toggle('active', on);
      b.setAttribute('aria-pressed', on ? 'true' : 'false');
    });
  };
  box.addEventListener('click', activate);
  box.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); activate(); }
  });
  variantBoxesEl.appendChild(box);
});

/* ── NAV SCROLL ── */
const nav = document.getElementById('nav');
window.addEventListener('scroll', () => {
  nav.classList.toggle('scrolled', window.scrollY > 10);
}, { passive: true });

/* ── DRAG / SWIPE ── */
const heroEl = document.getElementById('hero');
function dragStart(x) { startX = x; dragDx = 0; isDragging = true; }
function dragMove(x)  { if (isDragging) dragDx = x - startX; }
function dragEnd()    {
  if (!isDragging) return; isDragging = false;
  if      (dragDx < -44) setSlide(current + 1);
  else if (dragDx >  44) setSlide(current - 1);
}
heroEl.addEventListener('touchstart', e => dragStart(e.touches[0].clientX),    { passive: true });
heroEl.addEventListener('touchmove',  e => dragMove(e.touches[0].clientX),     { passive: true });
heroEl.addEventListener('touchend',   dragEnd,                                  { passive: true });
heroEl.addEventListener('mousedown',  e => dragStart(e.clientX));
heroEl.addEventListener('mousemove',  e => dragMove(e.clientX));
heroEl.addEventListener('mouseup',    dragEnd);
heroEl.addEventListener('mouseleave', dragEnd);

/* ── EXHIBIT NAV ── Vaan occupies exactly one slot regardless of
   which variant box is active; Next/Prev skip straight to the next
   design (Imai), never into the earring/ring/pendant sub-states. ── */
const PIECES = [
  { file: 'suri.html' },
  { file: 'niva.html' },
  { file: 'vara.html' },
  { file: 'rani.html' },
  { file: 'abha.html' },
  { file: 'sama.html' }
];
function buildExhibitNav() {
  const nav = document.getElementById('exhibitNav');
  const prevChevron = `<svg viewBox="0 0 10 10" fill="none" width="10" height="10"><path d="M7 2L3 5L7 8" stroke="rgba(240,237,228,0.7)" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  const nextChevron = `<svg viewBox="0 0 10 10" fill="none" width="10" height="10"><path d="M3 2L7 5L3 8" stroke="rgba(240,237,228,0.7)" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

  const prevSide = document.createElement('a');
  prevSide.className = 'exhibit-nav-side prev';
  if (design.prevPiece) {
    prevSide.href = design.prevPiece.file;
    prevSide.innerHTML = `<div class="exhibit-nav-label-row">${prevChevron}<span class="exhibit-nav-name">${design.prevPiece.name}</span></div><span class="exhibit-nav-count">${PIECE_INDEX - 1} / ${PIECES.length}</span>`;
  } else {
    prevSide.href = 'index.html';
    prevSide.innerHTML = `<div class="exhibit-nav-label-row">${prevChevron}<span class="exhibit-nav-name">Origami</span></div><span class="exhibit-nav-count">Back to collection</span>`;
  }
  nav.appendChild(prevSide);

  const centerWrap = document.createElement('div');
  centerWrap.className = 'exhibit-nav-center';

  const addBtn = document.createElement('button');
  addBtn.className = 'exhibit-nav-add';
  addBtn.type = 'button';
  addBtn.setAttribute('aria-label', 'Quick add to cart');
  addBtn.innerHTML = `<svg viewBox="0 0 16 16" fill="none" width="15" height="15"><path d="M8 14C8 14 1.5 9.8 1.5 5.2C1.5 2.9 3.3 1.5 5.2 1.5C6.5 1.5 8 2.3 8 3.9C8 2.3 9.5 1.5 10.8 1.5C12.7 1.5 14.5 2.9 14.5 5.2C14.5 9.8 8 14 8 14Z" stroke="#797842" stroke-width="1.4" stroke-linejoin="round"/></svg><span class="exhibit-nav-tooltip">I like it</span>`;
  addBtn.addEventListener('click', async () => {
    addBtn.disabled = true;
    const v = variants[activeKey];
    try {
      await addToCart(v.shopifyVariantId, 1);
      await updateCartBadge();
      showToast(`${design.name} ${v.label} added to cart`);
    } catch (err) {
      showToast('Could not add to cart — please try again');
      console.error(err);
    } finally {
      addBtn.disabled = false;
    }
  });
  centerWrap.appendChild(addBtn);

  const gridBtn = document.createElement('a');
  gridBtn.className = 'exhibit-nav-grid';
  gridBtn.href = 'origami.html';
  gridBtn.setAttribute('aria-label', 'View all');
  gridBtn.innerHTML = `<svg viewBox="0 0 16 16" fill="none" width="15" height="15"><rect x="1.5" y="1.5" width="5.5" height="5.5" rx="1" fill="#797842"/><rect x="9" y="1.5" width="5.5" height="5.5" rx="1" fill="#797842"/><rect x="1.5" y="9" width="5.5" height="5.5" rx="1" fill="#797842"/><rect x="9" y="9" width="5.5" height="5.5" rx="1" fill="#797842"/></svg><span class="exhibit-nav-tooltip">View all</span>`;
  centerWrap.appendChild(gridBtn);

  nav.appendChild(centerWrap);

  const nextSide = document.createElement('a');
  nextSide.className = 'exhibit-nav-side next';
  if (design.nextPiece) {
    nextSide.href = design.nextPiece.file;
    nextSide.innerHTML = `<div class="exhibit-nav-label-row"><span class="exhibit-nav-name">${design.nextPiece.name}</span>${nextChevron}</div><span class="exhibit-nav-count">${PIECE_INDEX + 1} / ${PIECES.length}</span>`;
  } else {
    nextSide.href = 'index.html';
    nextSide.innerHTML = `<div class="exhibit-nav-label-row"><span class="exhibit-nav-name">Origami</span>${nextChevron}</div><span class="exhibit-nav-count">Back to collection</span>`;
  }
  nav.appendChild(nextSide);
}
buildExhibitNav();

/* ── TABS ── */
document.getElementById('tabRow').querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', function () {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('on'));
    this.classList.add('on');
    const t = this.dataset.t;
    document.getElementById('panel-design').style.display = t === 'design' ? 'block' : 'none';
    document.getElementById('panel-prov').style.display   = t === 'prov'   ? 'block' : 'none';
  });
});

/* ── EXPANDERS ── */
function makeExp(headId, iconId, bodyId) {
  let open = false;
  document.getElementById(headId).addEventListener('click', () => {
    open = !open;
    document.getElementById(bodyId).classList.toggle('open', open);
    document.getElementById(iconId).classList.toggle('open', open);
  });
}
makeExp('skinHead', 'skinIcon', 'skinBody');
makeExp('sizeHead', 'sizeIcon', 'sizeBody');

/* ── SKIN TILES ── */
document.getElementById('skinRow').querySelectorAll('.stile').forEach(t => {
  t.addEventListener('click', function () {
    document.querySelectorAll('.stile').forEach(x => x.classList.remove('sel'));
    this.classList.add('sel');
  });
});

/* ── QUANTITY ── */
let currentQty = 1;
const qtyValueEl = document.getElementById('qtyValue');
document.getElementById('qtyMinus').addEventListener('click', () => {
  if (currentQty > 1) { currentQty--; qtyValueEl.textContent = currentQty; }
});
document.getElementById('qtyPlus').addEventListener('click', () => {
  currentQty++; qtyValueEl.textContent = currentQty;
});

/* ── ADD TO CART — always reads the currently active variant, no backend ── */
document.getElementById('ctaBtn').addEventListener('click', async () => {
  const btn = document.getElementById('ctaBtn');
  const v = variants[activeKey];
  btn.disabled = true;
  btn.textContent = 'Adding...';
  try {
    await addToCart(v.shopifyVariantId, currentQty);
    await updateCartBadge();
    showToast(`${design.name} ${v.label} added to cart`);
    currentQty = 1;
    qtyValueEl.textContent = currentQty;
  } catch (err) {
    showToast('Could not add to cart — please try again');
    console.error(err);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Add to cart';
  }
});

/* ── INITIAL RENDER ── earring is the default open variant ── */
renderVariant(activeKey);
</script>
